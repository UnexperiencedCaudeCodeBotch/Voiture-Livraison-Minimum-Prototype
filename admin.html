<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - DirectDrive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; line-height: 1.6; }

        /* Login */
        #login-screen { max-width: 400px; margin: 5rem auto; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        #login-screen h1 { font-size: 2rem; margin-bottom: .5rem; }
        #login-screen .subtitle { color: #6b7280; margin-bottom: 2rem; }
        .hint { margin-top: 1.5rem; font-size: .85rem; color: #9ca3af; }
        .error-msg { background: #fef2f2; color: #dc2626; padding: .75rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-weight: 600; margin-bottom: .4rem; font-size: .9rem; }
        input[type="password"], input[type="url"] { width: 100%; padding: .75rem; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; transition: border-color .2s; }
        input:focus { outline: none; border-color: #2563eb; }

        /* Buttons */
        .btn { display: inline-block; padding: .875rem 1.5rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s, transform .1s; }
        .btn:hover { background: #1d4ed8; }
        .btn:active { transform: scale(.97); }
        .btn.full { width: 100%; }
        .btn-sm { padding: .5rem 1.1rem; font-size: .875rem; }
        .btn-outline { background: transparent; color: #2563eb; border: 2px solid #2563eb; }
        .btn-outline:hover { background: #eff6ff; }
        .btn-danger-outline { background: transparent; color: #ef4444; border: 2px solid #ef4444; }
        .btn-danger-outline:hover { background: #fef2f2; }
        .btn.flash { background: #16a34a !important; }

        /* Admin shell */
        .hidden { display: none !important; }
        #admin-panel { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .admin-header { background: white; padding: 1.25rem 1.75rem; border-radius: 12px; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .admin-header h1 { font-size: 1.6rem; color: #1a1a1a; }
        .admin-header-right { display: flex; gap: 1rem; align-items: center; }
        .admin-header-right a { text-decoration: none; color: #4b5563; font-weight: 500; }
        .admin-header-right a:hover { color: #2563eb; }
        .logout-btn { padding: .5rem 1.1rem; background: transparent; color: #ef4444; border: 2px solid #ef4444; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all .2s; }
        .logout-btn:hover { background: #ef4444; color: white; }

        /* Success banner */
        #success-banner { min-height: 2.5rem; margin-bottom: .75rem; }
        .success-msg { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; padding: .75rem 1rem; border-radius: 8px; font-size: .9rem; }

        /* Tabs */
        #tabs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .tab-btn { padding: .55rem 1.1rem; background: white; border: 2px solid #e5e7eb; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: .875rem; color: #4b5563; transition: all .2s; }
        .tab-btn:hover { border-color: #2563eb; color: #2563eb; }
        .tab-btn.active { background: #2563eb; border-color: #2563eb; color: white; }

        /* Tab panel */
        #tab-content { background: white; padding: 2rem; border-radius: 12px; }
        #tab-content h2 { font-size: 1.4rem; margin-bottom: .4rem; }
        #tab-content > p, .tab-desc { color: #6b7280; margin-bottom: 1.5rem; font-size: .9rem; }

        /* Image grid */
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .image-item { border: 2px solid #e5e7eb; border-radius: 10px; padding: 1.25rem; }
        .image-preview { width: 100%; height: 130px; background: #f3f4f6; border-radius: 8px; margin-bottom: .9rem; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 2.5rem; font-weight: 700; color: #2563eb; }
        .image-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .image-preview.cover img { width: 100%; height: 100%; object-fit: cover; }
        .image-item h3 { font-size: .95rem; font-weight: 600; margin-bottom: .2rem; }
        .image-item .status { color: #6b7280; font-size: .8rem; margin-bottom: .75rem; }
        .image-item .btn-row { display: flex; gap: .5rem; margin-top: .5rem; }

        /* Hero preview */
        .hero-preview { width: 100%; height: 180px; border-radius: 10px; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; background: linear-gradient(135deg, #1e40af, #2563eb); }
        .hero-preview img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        .hero-preview-overlay { position: relative; color: white; font-size: 1.1rem; font-weight: 700; text-align: center; padding: 1rem; }

        /* Security note */
        .info-box { background: #fffbeb; border: 1px solid #f59e0b; border-radius: 8px; padding: 1rem; margin: 1rem 0 1.5rem; font-size: .85rem; color: #92400e; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>&#128274; Admin Login</h1>
    <p class="subtitle">Access the DirectDrive admin panel</p>
    <div id="login-error"></div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter admin password">
    </div>
    <button class="btn full" id="login-btn">Login</button>
    <p class="hint">Default password: <code>admin123</code></p>
</div>

<div id="admin-panel" class="hidden">
    <div class="admin-header">
        <h1>DirectDrive Admin</h1>
        <div class="admin-header-right">
            <a href="index.html">&#8592; View Site</a>
            <button class="logout-btn" id="logout-btn">Logout</button>
        </div>
    </div>
    <div id="success-banner"></div>
    <div id="tabs"></div>
    <div id="tab-content"></div>
</div>

<script>
var ADMIN_PASSWORD = 'admin123';

var BRANDS = [
    { id: 'ford',     name: 'Ford',           letter: 'F'  },
    { id: 'tesla',    name: 'Tesla',          letter: 'T'  },
    { id: 'gm',       name: 'General Motors', letter: 'GM' },
    { id: 'rivian',   name: 'Rivian',         letter: 'R'  },
    { id: 'lucid',    name: 'Lucid',          letter: 'L'  },
    { id: 'polestar', name: 'Polestar',       letter: 'P'  }
];

var CAR_DATA = {
    'ford':     ['f150-lightning:F-150 Lightning','mustang-mach-e:Mustang Mach-E','f150:F-150','bronco:Bronco','explorer:Explorer','expedition:Expedition','ranger:Ranger','maverick:Maverick','edge:Edge','escape:Escape','bronco-sport:Bronco Sport','transit:Transit'],
    'tesla':    ['model-s:Model S','model-3:Model 3','model-x:Model X','model-y:Model Y'],
    'gm':       ['silverado:Silverado','equinox-ev:Equinox EV','blazer-ev:Blazer EV','colorado:Colorado','traverse:Traverse','trax:Trax','trailblazer:Trailblazer','malibu:Malibu','gmc-sierra:Sierra','gmc-canyon:Canyon','gmc-yukon:Yukon','gmc-terrain:Terrain','gmc-acadia:Acadia','escalade:Escalade','lyriq:Lyriq','ct5:CT5','enclave:Enclave','envision:Envision'],
    'rivian':   ['r1t:R1T','r1s:R1S'],
    'lucid':    ['lucid-air:Lucid Air','lucid-gravity:Lucid Gravity'],
    'polestar': ['polestar-2:Polestar 2','polestar-3:Polestar 3','polestar-4:Polestar 4']
};

var TABS = [
    { id: 'homepage', label: '&#127968; Homepage'    },
    { id: 'apikey',   label: '&#129302; AI Assistant' },
    { id: 'brands',   label: '&#127950; Brand Logos'  },
    { id: 'ford',     label: 'Ford'                   },
    { id: 'tesla',    label: 'Tesla'                  },
    { id: 'gm',       label: 'General Motors'         },
    { id: 'rivian',   label: 'Rivian'                 },
    { id: 'lucid',    label: 'Lucid'                  },
    { id: 'polestar', label: 'Polestar'               }
];

var activeTab = 'homepage';

/* ── Helpers ───────────────────────────────────────────── */
function getImg(type, id)      { return localStorage.getItem(type + '-image-' + id) || ''; }
function setImg(type, id, url) {
    if (url.trim()) localStorage.setItem(type + '-image-' + id, url.trim());
    else            localStorage.removeItem(type + '-image-' + id);
}

function showSuccess(msg) {
    var el = document.getElementById('success-banner');
    el.innerHTML = '';
    var d = document.createElement('div');
    d.className = 'success-msg';
    d.textContent = msg;
    el.appendChild(d);
    setTimeout(function() { el.innerHTML = ''; }, 3000);
}

function flashBtn(btn) {
    btn.classList.add('flash');
    btn.textContent = '✓ Saved';
    setTimeout(function() {
        btn.classList.remove('flash');
        btn.textContent = 'Save';
    }, 1500);
}

/* ── Auth ──────────────────────────────────────────────── */
function doLogin() {
    var btn = document.getElementById('login-btn');
    var pw  = document.getElementById('password').value;
    // Visual: brief loading state
    btn.textContent = 'Checking…';
    btn.disabled = true;
    setTimeout(function() {
        if (pw === ADMIN_PASSWORD) {
            sessionStorage.setItem('adminLoggedIn', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderTabs();
            showTab('homepage');
        } else {
            document.getElementById('login-error').innerHTML = '';
            var err = document.createElement('div');
            err.className = 'error-msg';
            err.textContent = 'Incorrect password. Please try again.';
            document.getElementById('login-error').appendChild(err);
            btn.textContent = 'Login';
            btn.disabled = false;
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    }, 300);
}

document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
});
document.getElementById('logout-btn').addEventListener('click', function() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('admin-panel').classList.add('hidden');
    document.getElementById('password').value = '';
    document.getElementById('login-error').innerHTML = '';
    document.getElementById('login-btn').textContent = 'Login';
    document.getElementById('login-btn').disabled = false;
});

/* ── Tabs ──────────────────────────────────────────────── */
function renderTabs() {
    var container = document.getElementById('tabs');
    container.innerHTML = '';
    TABS.forEach(function(t) {
        var btn = document.createElement('button');
        btn.className = 'tab-btn' + (t.id === activeTab ? ' active' : '');
        btn.innerHTML = t.label;
        btn.addEventListener('click', function() { showTab(t.id); });
        container.appendChild(btn);
    });
}

function showTab(id) {
    activeTab = id;
    renderTabs();
    var content = document.getElementById('tab-content');
    content.innerHTML = '';
    if      (id === 'homepage') renderHomepageTab(content);
    else if (id === 'apikey')   renderApiKeyTab(content);
    else if (id === 'brands')   renderBrandsTab(content);
    else                        renderCarsTab(id, content);
}

/* ── Homepage tab ──────────────────────────────────────── */
function renderHomepageTab(container) {
    var current = getImg('hero', 'main');

    var h2 = document.createElement('h2');
    h2.textContent = 'Homepage Hero Image';
    container.appendChild(h2);

    var p = document.createElement('p');
    p.className = 'tab-desc';
    p.textContent = 'Set a background image for the welcome banner on the front page.';
    container.appendChild(p);

    var preview = document.createElement('div');
    preview.className = 'hero-preview';
    if (current) {
        var img = document.createElement('img');
        img.src = current;
        img.alt = 'Hero preview';
        img.onerror = function() { this.style.display = 'none'; };
        preview.appendChild(img);
    }
    var overlay = document.createElement('div');
    overlay.className = 'hero-preview-overlay';
    overlay.textContent = current ? 'Hero Preview' : 'Buy Your New Car Directly from the Manufacturer';
    preview.appendChild(overlay);
    container.appendChild(preview);

    var fg = document.createElement('div');
    fg.className = 'form-group';
    var lbl = document.createElement('label');
    lbl.textContent = 'Image URL';
    var inp = document.createElement('input');
    inp.type = 'url';
    inp.id = 'hero-url';
    inp.placeholder = 'https://example.com/hero.jpg';
    inp.value = current;
    fg.appendChild(lbl);
    fg.appendChild(inp);
    container.appendChild(fg);

    var row = document.createElement('div');
    row.style.display = 'flex';
    row.style.gap = '.5rem';

    var saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-sm';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', function() {
        setImg('hero', 'main', document.getElementById('hero-url').value);
        showSuccess('Hero image updated!');
        flashBtn(saveBtn);
        setTimeout(function() { showTab('homepage'); }, 1600);
    });
    row.appendChild(saveBtn);

    if (current) {
        var resetBtn = document.createElement('button');
        resetBtn.className = 'btn btn-sm btn-outline';
        resetBtn.textContent = 'Reset to Default';
        resetBtn.addEventListener('click', function() {
            setImg('hero', 'main', '');
            showSuccess('Hero image reset to default gradient.');
            showTab('homepage');
        });
        row.appendChild(resetBtn);
    }
    container.appendChild(row);
}

/* ── API Key tab ───────────────────────────────────────── */
function renderApiKeyTab(container) {
    var current = localStorage.getItem('dd-api-key') || '';

    var h2 = document.createElement('h2');
    h2.textContent = 'AI Assistant';
    container.appendChild(h2);

    var p = document.createElement('p');
    p.className = 'tab-desc';
    p.textContent = 'Enter your Anthropic API key to power the DirectDrive AI car-buying assistant on every page. The key is stored in your browser only.';
    container.appendChild(p);

    var note = document.createElement('div');
    note.className = 'info-box';
    note.innerHTML = '<strong>Security note:</strong> This key is visible to anyone with access to this browser. For a production site, use a backend proxy instead.';
    container.appendChild(note);

    var fg = document.createElement('div');
    fg.className = 'form-group';
    var lbl = document.createElement('label');
    lbl.textContent = 'Anthropic API Key';
    var inp = document.createElement('input');
    inp.type = 'password';
    inp.id = 'api-key-input';
    inp.placeholder = 'sk-ant-...';
    inp.value = current;
    fg.appendChild(lbl);
    fg.appendChild(inp);
    container.appendChild(fg);

    if (current) {
        var masked = document.createElement('p');
        masked.style.cssText = 'font-size:.85rem;color:#6b7280;margin-bottom:1rem;';
        masked.innerHTML = 'Current key: <code>' + current.substring(0, 7) + '...' + current.slice(-4) + '</code>';
        container.appendChild(masked);
    }

    var row = document.createElement('div');
    row.style.display = 'flex';
    row.style.gap = '.5rem';

    var saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-sm';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', function() {
        var key = document.getElementById('api-key-input').value.trim();
        if (key) {
            localStorage.setItem('dd-api-key', key);
            showSuccess('API key saved! AI assistant is now active on all pages.');
            flashBtn(saveBtn);
            setTimeout(function() { showTab('apikey'); }, 1600);
        } else {
            showSuccess('No key entered — nothing was saved.');
        }
    });
    row.appendChild(saveBtn);

    if (current) {
        var removeBtn = document.createElement('button');
        removeBtn.className = 'btn btn-sm btn-danger-outline';
        removeBtn.textContent = 'Remove Key';
        removeBtn.addEventListener('click', function() {
            localStorage.removeItem('dd-api-key');
            showSuccess('API key removed. AI assistant deactivated.');
            showTab('apikey');
        });
        row.appendChild(removeBtn);
    }
    container.appendChild(row);
}

/* ── Brands tab ────────────────────────────────────────── */
function renderBrandsTab(container) {
    var h2 = document.createElement('h2');
    h2.textContent = 'Brand Logos';
    container.appendChild(h2);
    var p = document.createElement('p');
    p.className = 'tab-desc';
    p.textContent = 'Set custom logo images for each manufacturer card on the homepage.';
    container.appendChild(p);

    var grid = document.createElement('div');
    grid.className = 'image-grid';

    BRANDS.forEach(function(brand) {
        grid.appendChild(makeImageItem('brand', brand.id, brand.name, brand.letter, false));
    });
    container.appendChild(grid);
}

/* ── Cars tab ──────────────────────────────────────────── */
function renderCarsTab(brandId, container) {
    var brand = BRANDS.find(function(b) { return b.id === brandId; });
    var brandName = brand ? brand.name : brandId;

    var h2 = document.createElement('h2');
    h2.textContent = brandName + ' Car Images';
    container.appendChild(h2);
    var p = document.createElement('p');
    p.className = 'tab-desc';
    p.textContent = 'Set custom photos for each vehicle in the ' + brandName + ' inventory.';
    container.appendChild(p);

    var grid = document.createElement('div');
    grid.className = 'image-grid';

    var cars = CAR_DATA[brandId] || [];
    cars.forEach(function(entry) {
        var parts = entry.split(':');
        var carId = parts[0];
        var carName = parts.slice(1).join(':');
        grid.appendChild(makeImageItem('car', carId, carName, '🚗', true));
    });
    container.appendChild(grid);
}

/* ── Shared image item builder ─────────────────────────── */
function makeImageItem(type, id, name, fallback, isCover) {
    var current = getImg(type, id);

    var item = document.createElement('div');
    item.className = 'image-item';

    var preview = document.createElement('div');
    preview.className = 'image-preview' + (isCover ? ' cover' : '');
    if (current) {
        var img = document.createElement('img');
        img.src = current;
        img.alt = name;
        img.onerror = function() { this.style.display = 'none'; };
        preview.appendChild(img);
    } else {
        preview.textContent = fallback;
    }
    item.appendChild(preview);

    var h3 = document.createElement('h3');
    h3.textContent = name;
    item.appendChild(h3);

    var status = document.createElement('p');
    status.className = 'status';
    status.textContent = current ? 'Custom image set' : 'Using default';
    item.appendChild(status);

    var fg = document.createElement('div');
    fg.className = 'form-group';
    var lbl = document.createElement('label');
    lbl.textContent = 'Image URL';
    var inp = document.createElement('input');
    inp.type = 'url';
    inp.placeholder = 'https://...';
    inp.value = current;
    fg.appendChild(lbl);
    fg.appendChild(inp);
    item.appendChild(fg);

    var row = document.createElement('div');
    row.className = 'btn-row';

    var saveBtn = document.createElement('button');
    saveBtn.className = 'btn btn-sm';
    saveBtn.textContent = 'Save';
    saveBtn.addEventListener('click', function() {
        setImg(type, id, inp.value);
        showSuccess(name + ' image updated!');
        flashBtn(saveBtn);
        setTimeout(function() { showTab(activeTab); }, 1600);
    });
    row.appendChild(saveBtn);

    if (current) {
        var resetBtn = document.createElement('button');
        resetBtn.className = 'btn btn-sm btn-outline';
        resetBtn.textContent = 'Reset';
        resetBtn.addEventListener('click', function() {
            setImg(type, id, '');
            showSuccess(name + ' image reset to default.');
            showTab(activeTab);
        });
        row.appendChild(resetBtn);
    }

    item.appendChild(row);
    return item;
}

/* ── Init ──────────────────────────────────────────────── */
if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    renderTabs();
    showTab('homepage');
}
</script>
</body>
</html>
