<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Motors - DirectDrive</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; line-height: 1.6; color: #1a1a1a; background: #f9fafb; }
        header { background: #ffffff; border-bottom: 1px solid #e5e5e5; padding: 1.5rem 0; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #2563eb; text-decoration: none; }
        nav a { margin-left: 2rem; text-decoration: none; color: #4b5563; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: #2563eb; }
        .saved-count { background: #2563eb; color: white; padding: 0.25rem 0.5rem; border-radius: 12px; font-size: 0.75rem; margin-left: 0.5rem; }
        .brand-header { background: white; padding: 3rem 2rem; border-bottom: 1px solid #e5e5e5; }
        .brand-header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 2rem; }
        .back-button { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: #2563eb; font-weight: 600; padding: 0.75rem 1.25rem; border: 2px solid #2563eb; border-radius: 8px; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .back-button:hover { background: #2563eb; color: white; }
        .brand-logo-large { width: 100px; height: 100px; background: #f3f4f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; color: #2563eb; overflow: hidden; flex-shrink: 0; }
        .brand-logo-large img { width: 100%; height: 100%; object-fit: cover; }
        .brand-info h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .brand-info p { color: #6b7280; font-size: 1.1rem; }

        .brands-section { max-width: 1200px; margin: 0 auto; padding: 4rem 2rem; }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-header h2 { font-size: 2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; }
        .section-header p { font-size: 1.1rem; color: #6b7280; max-width: 600px; margin: 0 auto; }

        .brands-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 2rem; }
        .brand-card { background: white; border: 2px solid #e5e7eb; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s ease; text-decoration: none; color: inherit; display: block; }
        .brand-card:hover { border-color: #2563eb; transform: translateY(-4px); box-shadow: 0 12px 24px rgba(37, 99, 235, 0.15); }
        .brand-logo { width: 80px; height: 80px; background: #f3f4f6; border-radius: 50%; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; color: #2563eb; overflow: hidden; }
        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
        .brand-card h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; color: #1a1a1a; }
        .brand-card p { color: #6b7280; margin-bottom: 1rem; }
        .model-count { display: inline-block; background: #eff6ff; color: #2563eb; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; }

        @media (max-width: 768px) {
            .brand-header-content { flex-direction: column; text-align: center; }
            .brand-info h1 { font-size: 2rem; }
            nav { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">DirectDrive</a>
            <nav>
                <a href="index.html#brands">All Brands</a>
                <a href="index.html#saved">Saved Cars<span class="saved-count" id="header-saved-count">0</span></a>
            </nav>
        </div>
    </header>

    <section class="brand-header">
        <div class="brand-header-content">
            <a href="index.html" class="back-button">&#8592; Back to Brands</a>
            <div class="brand-logo-large" id="brand-logo">GM</div>
            <div class="brand-info">
                <h1>General Motors</h1>
                <p>Chevrolet, GMC, Cadillac, and Buick under one roof</p>
            </div>
        </div>
    </section>

    <section class="brands-section">
        <div class="section-header">
            <h2>Choose a GM Brand</h2>
            <p>Select one of General Motors' brands to browse its lineup and direct-to-consumer pricing</p>
        </div>
        <div class="brands-grid" id="subbrands-grid"></div>
    </section>

    <script>
        var subBrands = [
            { id: 'chevrolet', name: 'Chevrolet', letter: 'C',   description: 'Trucks, SUVs, and electric vehicles', models: 8, link: 'chevrolet-inventory.html' },
            { id: 'gmc',       name: 'GMC',       letter: 'GMC', description: 'Professional-grade trucks and SUVs', models: 5, link: 'gmc-inventory.html'       },
            { id: 'cadillac',  name: 'Cadillac',  letter: 'CAD', description: 'Luxury sedans and SUVs',             models: 3, link: 'cadillac-inventory.html'  },
            { id: 'buick',     name: 'Buick',     letter: 'B',   description: 'Premium crossovers and SUVs',       models: 2, link: 'buick-inventory.html'     }
        ];

        function getImageUrl(type, id) {
            return localStorage.getItem(type + '-image-' + id) || null;
        }

        function getSavedCars() {
            var saved = localStorage.getItem('savedCars');
            return saved ? JSON.parse(saved) : [];
        }

        function updateSavedCount() {
            var count = getSavedCars().length;
            var el = document.getElementById('header-saved-count');
            if (el) el.textContent = count;
        }

        function renderSubBrands() {
            var grid = document.getElementById('subbrands-grid');
            grid.innerHTML = '';
            subBrands.forEach(function(brand) {
                var imageUrl = getImageUrl('brand', brand.id);

                var card = document.createElement('a');
                card.href = brand.link;
                card.className = 'brand-card';

                var logo = document.createElement('div');
                logo.className = 'brand-logo';
                if (imageUrl) {
                    var img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = brand.name;
                    img.onerror = function() { this.parentElement.textContent = brand.letter; };
                    logo.appendChild(img);
                } else {
                    logo.textContent = brand.letter;
                }
                card.appendChild(logo);

                var h3 = document.createElement('h3');
                h3.textContent = brand.name;
                card.appendChild(h3);

                var p = document.createElement('p');
                p.textContent = brand.description;
                card.appendChild(p);

                var count = document.createElement('span');
                count.className = 'model-count';
                count.textContent = brand.models + ' Models Available';
                card.appendChild(count);

                grid.appendChild(card);
            });
        }

        function applyBrandImage() {
            var imageUrl = getImageUrl('brand', 'gm');
            var logoEl = document.getElementById('brand-logo');
            if (imageUrl && logoEl) {
                var img = document.createElement('img');
                img.src = imageUrl;
                img.alt = 'gm';
                img.onerror = function() { logoEl.textContent = 'GM'; };
                logoEl.innerHTML = '';
                logoEl.appendChild(img);
            }
        }

        applyBrandImage();
        updateSavedCount();
        renderSubBrands();
    </script>
<script src="chat-widget.js"></script>
</body>
</html>
